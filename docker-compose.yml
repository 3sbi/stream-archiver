services:
  telegram-bot-api:
    image: aiogram/telegram-bot-api:10.1
    container_name: telegram-bot-api
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - ./telegram-bot-api-data:/var/lib/telegram-bot-api
      - ./data:/data
    ports:
      - "8081:8081"

  script:
    build: .
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - ./data:/data