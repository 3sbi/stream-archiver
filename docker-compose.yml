services:
  telegram-bot-api:
    image: aiogram/telegram-bot-api:10.1
    container_name: telegram-bot-api
    restart: unless-stopped
    env_file:
      - .env
    command:
      - --api-id=${TELEGRAM_API_ID}
      - --api-hash=${TELEGRAM_API_HASH}
      - --local
      - --http-port=8081
    volumes:
      - ./telegram-bot-api-data:/var/lib/telegram-bot-api
      - ./data:/data
    ports:
      - "8081:8081"

  stream-archiver:
    build: .
    container_name: stream-archiver
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - ./data:/data
    ports:
      - "127.0.0.1:8080:8080"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 3